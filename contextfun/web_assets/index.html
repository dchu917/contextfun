<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ctx</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div>
          <p class="eyebrow">Local Context Manager</p>
          <h1>ctx</h1>
          <p class="subtitle">A searchable list of previous workstreams, what they were doing, and the exact command to continue them.</p>
        </div>
      </header>

      <section class="toolbar">
        <label class="search-field">
          <span>Find a workstream</span>
          <input id="filter-query" type="text" placeholder="feature-audit, dataset, branch, modal..." />
        </label>
      </section>

      <main class="panel">
        <div class="panel-head">
          <h2>Workstreams</h2>
          <span id="list-count" class="panel-note"></span>
        </div>
        <div id="workstream-list" class="workstream-list"></div>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
